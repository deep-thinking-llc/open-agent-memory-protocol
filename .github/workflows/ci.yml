name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# kizuna-stage-1 runs the actions runner as root in a user namespace that
# strips CAP_CHOWN, so tar's default ownership-preservation behaviour fails
# with EPERM on every extraction (mise-action, setup-*, etc.). Setting
# TAR_OPTIONS=--no-same-owner at the workflow level makes GNU tar skip the
# chown step everywhere, which is the actual fix for this runner's
# environment rather than a workaround.
env:
  TAR_OPTIONS: --no-same-owner

jobs:
  # ── Rust ────────────────────────────────────────────────

  test-rust:
    name: Rust
    runs-on: [self-hosted, Linux, build-hetzner]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            reference/rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('reference/rust/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Run tests
        working-directory: reference/rust
        run: cargo test --lib --tests

  # ── TypeScript ──────────────────────────────────────────

  test-typescript:
    name: TypeScript
    runs-on: [self-hosted, Linux, build-hetzner]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v2

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: reference/typescript/node_modules
          key: ts-${{ runner.os }}-${{ hashFiles('reference/typescript/package-lock.json') }}
          restore-keys: ts-${{ runner.os }}-

      - name: Install dependencies
        working-directory: reference/typescript
        run: npm ci

      - name: Build
        working-directory: reference/typescript
        run: npm run build

      - name: Run tests
        working-directory: reference/typescript
        run: npm test

  # ── Python ─────────────────────────────────────────────

  test-python:
    name: Python ${{ matrix.python-version }}
    runs-on: [self-hosted, Linux, build-hetzner]
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} via mise
        uses: jdx/mise-action@v2
        with:
          tool_versions: |
            python ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('reference/python/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: reference/python
        # venv keeps the install isolated from any system-managed Python.
        run: |-
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        working-directory: reference/python
        run: .venv/bin/python -m pytest tests/ -v

  # ── Go ─────────────────────────────────────────────────

  test-go:
    name: Go
    runs-on: [self-hosted, Linux, build-hetzner]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v2

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('reference/go/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Download Go modules
        working-directory: reference/go
        run: go mod download

      - name: Run tests
        working-directory: reference/go
        run: go test ./... -count=1

  # ── Elixir ─────────────────────────────────────────────

  test-elixir:
    name: Elixir
    runs-on: [self-hosted, Linux, build-hetzner]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v2

      - name: Cache Elixir deps
        uses: actions/cache@v4
        with:
          path: |
            reference/elixir/deps
            reference/elixir/_build
          key: ex-${{ runner.os }}-${{ hashFiles('reference/elixir/mix.lock') }}
          restore-keys: ex-${{ runner.os }}-

      - name: Install dependencies
        working-directory: reference/elixir
        # mix may need hex/rebar fetched on first run; mise provides erlang+elixir
        # but doesn't auto-install hex/rebar.
        run: |-
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Run tests
        working-directory: reference/elixir
        run: mix test

  # ── Reference Server ─────────────────────────────────

  test-server:
    name: Reference Server
    runs-on: [self-hosted, Linux, build-hetzner]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v2

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: server-${{ runner.os }}-${{ hashFiles('reference/server/pyproject.toml') }}
          restore-keys: server-${{ runner.os }}-

      - name: Install dependencies
        working-directory: reference/server
        # venv bypasses PEP 668 on Debian/Ubuntu self-hosted runners. The
        # local reference/python types must be installed before the server
        # so the server's "oamp-types>=1.0.0" requirement resolves to the
        # in-tree version (PyPI's release lags behind tip and lacks newer
        # fields like provenance).
        run: |-
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ../python
          .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        working-directory: reference/server
        run: PYTHONPATH=src .venv/bin/python -m pytest tests/ -v

  # ── Interop canary (self-loopback against reference server) ────

  interop-canary:
    name: Interop canary (reference server self-loopback)
    runs-on: [self-hosted, Linux, build-hetzner]
    needs: [test-server]
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v2

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: server-${{ runner.os }}-${{ hashFiles('reference/server/pyproject.toml') }}
          restore-keys: server-${{ runner.os }}-

      - name: Install reference server
        working-directory: reference/server
        # venv bypasses PEP 668. Local types must precede the server install
        # so the in-tree oamp-types resolves the server's PyPI dependency.
        run: |-
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ../python
          .venv/bin/pip install -e ".[dev]"

      - name: Start two reference server instances
        working-directory: reference/server
        run: |-
          mkdir -p /tmp/oamp-canary
          PYTHONPATH=src nohup .venv/bin/python -m oamp_server --host 127.0.0.1 --port 8001 --db-path /tmp/oamp-canary/producer.db > /tmp/oamp-canary/producer.log 2>&1 &
          echo $! > /tmp/oamp-canary/producer.pid
          PYTHONPATH=src nohup .venv/bin/python -m oamp_server --host 127.0.0.1 --port 8002 --db-path /tmp/oamp-canary/consumer.db > /tmp/oamp-canary/consumer.log 2>&1 &
          echo $! > /tmp/oamp-canary/consumer.pid

      - name: Wait for servers to become healthy
        run: |-
          for url in http://127.0.0.1:8001/health http://127.0.0.1:8002/health; do
            for i in $(seq 1 30); do
              if curl -sf "$url" >/dev/null; then
                echo "ready: $url"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "timeout waiting for $url"
                cat /tmp/oamp-canary/*.log
                exit 1
              fi
              sleep 1
            done
          done

      - name: Run interop canary
        run: |-
          scripts/interop-roundtrip.sh \
            --producer-url http://127.0.0.1:8001 \
            --consumer-url http://127.0.0.1:8002 \
            --out-dir /tmp/oamp-canary/out

      - name: Stop reference servers
        if: always()
        run: |-
          for f in /tmp/oamp-canary/producer.pid /tmp/oamp-canary/consumer.pid; do
            [ -f "$f" ] && kill "$(cat "$f")" 2>/dev/null || true
          done

      - name: Upload canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-canary-artifacts
          path: |
            /tmp/oamp-canary/out/
            /tmp/oamp-canary/*.log
          if-no-files-found: warn

  # ── Spec validation & cross-language checks ─────────────

  cross-language-check:
    name: Cross-language consistency
    runs-on: [self-hosted, Linux, build-hetzner]
    # Only require what reliably runs on this runner today. The TS/Go/Elixir/
    # Python-matrix jobs fail on toolchain or setup-python issues that need
    # runner-side fixes; including them here would skip this check on every
    # run. Spec consistency does not need those toolchains to evaluate — it
    # reads source files directly.
    needs: [test-rust, test-server]
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up toolchains via mise
        uses: jdx/mise-action@v2

      - name: Validate spec examples (Python)
        working-directory: reference/python
        # venv keeps the install isolated from any system-managed Python.
        run: |-
          python3 -m venv .venv
          .venv/bin/pip install -e ".[dev]" -q
          .venv/bin/python -c "
          import json, sys
          from oamp_types import KnowledgeEntry, KnowledgeStore, UserModel

          for name, cls in [
              ('knowledge-entry', KnowledgeEntry),
              ('knowledge-store', KnowledgeStore),
              ('user-model', UserModel),
          ]:
              path = f'../../spec/v1/examples/{name}.json'
              with open(path) as f:
                  data = json.load(f)
              obj = cls.model_validate(data)
              print(f'  ✓ {name}: {type(obj).__name__}')
          "

      - name: Cross-language — Check OAMP_VERSION matches across implementations
        run: |-
          RUST_VER=$(grep 'OAMP_VERSION' reference/rust/src/knowledge.rs | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          TS_VER=$(grep "OAMP_VERSION" reference/typescript/src/index.ts | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          PY_VER=$(grep "OAMP_VERSION" reference/python/src/oamp_types/__init__.py | head -1 | sed "s/.*\"\([^\"]*\)\".*/\1/")
          GO_VER=$(grep 'OAMPVersion =' reference/go/oamp.go | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          EX_VER=$(grep 'oamp_version' reference/elixir/lib/oamp_types.ex | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          SPEC_VER=$(grep 'oamp_version' spec/v1/oamp-v1.md | head -1 | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' || true)

          echo "Rust:       $RUST_VER"
          echo "TypeScript: $TS_VER"
          echo "Python:    $PY_VER"
          echo "Go:        $GO_VER"
          echo "Elixir:    $EX_VER"
          echo "Spec:       $SPEC_VER"

          if [ "$RUST_VER" != "$TS_VER" ] || [ "$RUST_VER" != "$PY_VER" ] || [ "$RUST_VER" != "$GO_VER" ] || [ "$RUST_VER" != "$EX_VER" ]; then
            echo "ERROR: Version mismatch across implementations!"
            exit 1
          fi
          echo "All implementations agree on version: $RUST_VER ✓"