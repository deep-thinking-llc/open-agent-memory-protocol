services:
  oamp-server:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - oamp-keys:/app/keys
      - oamp-data:/data
    environment:
      - OAMP_DB_PATH=/data/oamp.db
      - OAMP_ENCRYPTION_KEY_DIR=/app/keys
      - OAMP_HOST=0.0.0.0
      - OAMP_PORT=8000
      - OAMP_AUDIT_LOG=true
    restart: unless-stopped

volumes:
  oamp-keys:
  oamp-data:
