services:
  oamp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - oamp-data:/app/keys
      - oamp-db:/app
    environment:
      - OAMP_DB_PATH=/app/oamp.db
      - OAMP_ENCRYPTION_KEY_DIR=/app/keys
      - OAMP_HOST=0.0.0.0
      - OAMP_PORT=8000
      - OAMP_AUDIT_LOG=true

volumes:
  oamp-data:
  oamp-db:
